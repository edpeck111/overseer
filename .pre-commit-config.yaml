# Pre-commit hooks for OVERSEER v3.
# Install:  pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|mjs|json|css|html|md)$
        exclude: ^(legacy_server\.py|\.trash_local/|shell/dist/|docs/.*\.html$)

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.380
    hooks:
      - id: pyright
        additional_dependencies: ["flask>=3.0", "requests>=2.31", "psutil>=5.9"]
