<!DOCTYPE html>
<html lang="en" data-crt="on">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<title>OVERSEER</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=VT323&display=swap">
<link rel="stylesheet" href="dist/main.css">
</head>
<body>

<!-- The terminal frame. data-mode is set by the shell on boot and on
     resize (chrome/mode.js). All chrome and content render inside. -->
<div class="terminal" data-mode="phone" id="term">
  <div class="term-glow"></div>
  <div class="statusbar"   id="statusbar"></div>
  <div class="breadcrumb"  id="breadcrumb"></div>
  <div class="content"     id="content"></div>
  <div class="hotkeybar"   id="hotkeybar"></div>
  <div class="palette-wrap" id="palette"></div>
</div>

<!-- Service worker: Sprint 4 wires real cache strategies. Sprint 1 just
     registers the no-op so the lifecycle is exercised. -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>

<script src="dist/main.js" defer></script>

</body>
</html>
